# CV of Yinyi Lin — RenderCV format (https://rendercv.com/).
#
# This file drives BOTH the web CV page (/cv/) and the PDF generated by the
# render-cv GitHub Actions workflow (assets/rendercv/rendercv_output/Yinyi_Lin_CV.pdf).
# Entry shapes are chosen to render correctly in both places:
#   - Experience/Education: company/institution + position/area + dates
#   - Publications/Projects: rich entries
#   - Other sections: one-line entries (label + details) or bullets
# Keep entries in reverse chronological order. Do not add private data
# (birth date, ID numbers, residential address).
cv:
  name: Yinyi Lin
  email: yinyilin@hku.hk
  location: Hong Kong

  social_networks:
    - network: GitHub
      username: linyinyi # TODO: confirm intended public GitHub profile

  sections:
    Summary:
      - bullet: >-
          Postdoctoral Fellow, Department of Geography, The University of Hong Kong.
          Geospatial scientist working on GeoAI and multisource remote sensing for urban
          environmental health, climate resilience, and sustainable urbanization. I integrate
          satellite observations, environmental big data, spatial statistics, and artificial
          intelligence to produce high-resolution, policy-relevant evidence across cities and
          regions worldwide.

    Experience:
      - company: The University of Hong Kong, Department of Geography
        position: Postdoctoral Fellow
        location: Hong Kong
        start_date: 2021 # TODO: confirm start year/month of the postdoctoral appointment
        end_date: present

      - company: United Nations Economic and Social Commission for Asia and the Pacific (ESCAP)
        position: Intern
        # TODO: add dates, division, and location of the ESCAP internship

    Education:
