<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" fill="none" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="yl-cr-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" style="stop-color: var(--global-highlight-color); stop-opacity: 0.28" />
      <stop offset="1" style="stop-color: var(--global-highlight-color); stop-opacity: 0" />
    </linearGradient>
  </defs>
  <!-- area under the trajectory -->
  <path
    d="M18 30 H42 C 47 30 50 56 57 61 C 70 69 92 44 108 32 L 126 30 L 126 74 L 18 74 Z"
    fill="url(#yl-cr-area)"
  />
  <!-- axes (performance vs time) -->
  <g stroke="var(--global-theme-color)" stroke-width="1.5" stroke-linecap="round">
    <path d="M16 14 V74 H128" />
    <g stroke-width="1" opacity="0.8">
      <line x1="13" y1="30" x2="16" y2="30" />
      <line x1="44" y1="74" x2="44" y2="77" />
      <line x1="72" y1="74" x2="72" y2="77" />
      <line x1="100" y1="74" x2="100" y2="77" />
    </g>
  </g>
  <!-- pre-shock baseline -->
  <line
    x1="16"
    y1="30"
    x2="128"
    y2="30"
    stroke="var(--global-theme-color)"
    stroke-width="1.2"
    stroke-dasharray="5 4"
    opacity="0.5"
  />
  <!-- shock event -->
  <path
    d="M46 8 l-5 10 h6 l-5 10"
    stroke="var(--global-theme-color)"
    stroke-width="1.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.9"
  />
  <!-- disturbance and recovery trajectory -->
  <path
    d="M18 30 H42 C 47 30 50 56 57 61 C 70 69 92 44 108 32 L 126 30"
    stroke="var(--global-highlight-color)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- recovery marker with halo -->
  <circle cx="57" cy="61" r="6" fill="var(--global-highlight-color)" stroke="none" opacity="0.2" />
  <circle cx="57" cy="61" r="2.5" fill="var(--global-highlight-color)" stroke="none" />
</svg>
