<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" fill="none" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="yl-ur-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" style="stop-color: var(--global-theme-color); stop-opacity: 0.07" />
      <stop offset="1" style="stop-color: var(--global-theme-color); stop-opacity: 0.015" />
    </linearGradient>
  </defs>
  <!-- three land-cover time slices -->
  <g stroke="var(--global-theme-color)" stroke-width="1.2">
    <rect x="8" y="24" width="34" height="34" fill="url(#yl-ur-frame)" />
    <rect x="53" y="24" width="34" height="34" fill="url(#yl-ur-frame)" />
    <rect x="98" y="24" width="34" height="34" fill="url(#yl-ur-frame)" />
  </g>
  <!-- t1: sparse urban cells -->
  <g fill="var(--global-theme-color)" stroke="none">
    <rect x="11" y="49.5" width="6" height="6" opacity="0.5" />
    <rect x="18.5" y="49.5" width="6" height="6" opacity="0.35" />
    <rect x="11" y="42" width="6" height="6" opacity="0.42" />
  </g>
  <!-- t2: growth (new cells in warm) -->
  <g fill="var(--global-theme-color)" stroke="none">
    <rect x="56" y="49.5" width="6" height="6" opacity="0.55" />
    <rect x="63.5" y="49.5" width="6" height="6" opacity="0.4" />
    <rect x="56" y="42" width="6" height="6" opacity="0.48" />
  </g>
  <g fill="var(--global-highlight-color)" stroke="none">
    <rect x="71" y="49.5" width="6" height="6" opacity="0.75" />
    <rect x="63.5" y="42" width="6" height="6" opacity="0.55" />
    <rect x="56" y="34.5" width="6" height="6" opacity="0.4" />
  </g>
  <!-- t3: further expansion -->
  <g fill="var(--global-theme-color)" stroke="none">
    <rect x="101" y="49.5" width="6" height="6" opacity="0.6" />
    <rect x="108.5" y="49.5" width="6" height="6" opacity="0.5" />
    <rect x="101" y="42" width="6" height="6" opacity="0.55" />
    <rect x="116" y="49.5" width="6" height="6" opacity="0.42" />
    <rect x="108.5" y="42" width="6" height="6" opacity="0.35" />
    <rect x="101" y="34.5" width="6" height="6" opacity="0.45" />
  </g>
  <g fill="var(--global-highlight-color)" stroke="none">
    <rect x="123.5" y="49.5" width="6" height="6" opacity="0.85" />
    <rect x="116" y="42" width="6" height="6" opacity="0.65" />
    <rect x="108.5" y="34.5" width="6" height="6" opacity="0.5" />
    <rect x="101" y="27" width="6" height="6" opacity="0.35" />
  </g>
  <!-- change arrows -->
  <g stroke="var(--global-highlight-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="44" y1="41" x2="50" y2="41" />
    <path d="M47.5 38.5 L51 41 L47.5 43.5" />
    <line x1="89" y1="41" x2="95" y2="41" />
    <path d="M92.5 38.5 L96 41 L92.5 43.5" />
  </g>
  <!-- timeline -->
  <line x1="10" y1="72" x2="130" y2="72" stroke="var(--global-theme-color)" stroke-width="1.2" stroke-linecap="round" />
  <g fill="var(--global-theme-color)" stroke="none">
    <circle cx="25" cy="72" r="2.5" opacity="0.5" />
    <circle cx="70" cy="72" r="2.5" opacity="0.75" />
    <circle cx="115" cy="72" r="2.5" />
  </g>
</svg>
