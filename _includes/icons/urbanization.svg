<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" fill="none" aria-hidden="true" focusable="false">
  <!-- three land-cover time slices -->
  <g stroke="var(--global-theme-color)" stroke-width="2.5">
    <rect x="8" y="24" width="34" height="34" />
    <rect x="53" y="24" width="34" height="34" />
    <rect x="98" y="24" width="34" height="34" />
  </g>
  <!-- t1: sparse urban cells -->
  <g fill="var(--global-theme-color)" stroke="none" opacity="0.8">
    <rect x="11" y="49.5" width="6" height="6" />
    <rect x="18.5" y="49.5" width="6" height="6" />
    <rect x="11" y="42" width="6" height="6" />
  </g>
  <!-- t2: growth (new cells in warm) -->
  <g fill="var(--global-theme-color)" stroke="none" opacity="0.8">
    <rect x="56" y="49.5" width="6" height="6" />
    <rect x="63.5" y="49.5" width="6" height="6" />
    <rect x="56" y="42" width="6" height="6" />
  </g>
  <g fill="var(--global-highlight-color)" stroke="none" opacity="0.85">
    <rect x="71" y="49.5" width="6" height="6" />
    <rect x="63.5" y="42" width="6" height="6" />
    <rect x="56" y="34.5" width="6" height="6" />
  </g>
  <!-- t3: further expansion -->
  <g fill="var(--global-theme-color)" stroke="none" opacity="0.8">
    <rect x="101" y="49.5" width="6" height="6" />
    <rect x="108.5" y="49.5" width="6" height="6" />
    <rect x="101" y="42" width="6" height="6" />
    <rect x="116" y="49.5" width="6" height="6" />
    <rect x="108.5" y="42" width="6" height="6" />
    <rect x="101" y="34.5" width="6" height="6" />
  </g>
  <g fill="var(--global-highlight-color)" stroke="none" opacity="0.85">
    <rect x="123.5" y="49.5" width="6" height="6" />
    <rect x="116" y="42" width="6" height="6" />
    <rect x="108.5" y="34.5" width="6" height="6" />
    <rect x="101" y="27" width="6" height="6" />
  </g>
  <!-- change arrows -->
  <g stroke="var(--global-highlight-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="44" y1="41" x2="50" y2="41" />
    <path d="M47.5 38 L51.5 41 L47.5 44" />
    <line x1="89" y1="41" x2="95" y2="41" />
    <path d="M92.5 38 L96.5 41 L92.5 44" />
  </g>
  <!-- timeline -->
  <g stroke="var(--global-theme-color)" stroke-width="2" stroke-linecap="round">
    <line x1="10" y1="72" x2="130" y2="72" />
  </g>
  <g fill="var(--global-theme-color)" stroke="none">
    <circle cx="25" cy="72" r="3" />
    <circle cx="70" cy="72" r="3" />
    <circle cx="115" cy="72" r="3" />
  </g>
</svg>
