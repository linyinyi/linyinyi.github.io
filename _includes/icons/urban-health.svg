    <circle cx="68" cy="22" r="17" />
  </g>
  <!-- exposure-risk curve (mini chart) -->
  <g stroke="var(--global-theme-color)" stroke-width="2" stroke-linecap="round">
    <path d="M102 8 V32 H136" />
    <line x1="100" y1="14" x2="102" y2="14" stroke-width="1.5" />
    <line x1="112" y1="32" x2="112" y2="34" stroke-width="1.5" />
    <line x1="124" y1="32" x2="124" y2="34" stroke-width="1.5" />
  </g>
  <path
    d="M104 29 C 116 28 126 22 134 10"
