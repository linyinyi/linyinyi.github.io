<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" fill="none" aria-hidden="true" focusable="false">
  <defs>
    <radialGradient id="yl-uh-heat">
      <stop offset="0" style="stop-color: var(--global-highlight-color); stop-opacity: 0.35" />
      <stop offset="1" style="stop-color: var(--global-highlight-color); stop-opacity: 0" />
    </radialGradient>
    <radialGradient id="yl-uh-pol">
      <stop offset="0" style="stop-color: var(--global-theme-color); stop-opacity: 0.3" />
      <stop offset="1" style="stop-color: var(--global-theme-color); stop-opacity: 0" />
    </radialGradient>
    <linearGradient id="yl-uh-risk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" style="stop-color: var(--global-highlight-color); stop-opacity: 0.3" />
      <stop offset="1" style="stop-color: var(--global-highlight-color); stop-opacity: 0" />
    </linearGradient>
  </defs>
  <!-- compound exposure fields: heat (warm) and pollution (teal) glows -->
  <circle cx="42" cy="26" r="21" fill="url(#yl-uh-heat)" />
  <circle cx="68" cy="22" r="21" fill="url(#yl-uh-pol)" />
  <g stroke="var(--global-highlight-color)" stroke-width="1.2" stroke-dasharray="3.5 3">
    <circle cx="42" cy="26" r="9" opacity="0.9" />
    <circle cx="42" cy="26" r="17" opacity="0.55" />
  </g>
  <g stroke="var(--global-theme-color)" stroke-width="1.2" stroke-dasharray="3.5 3">
    <circle cx="68" cy="22" r="9" opacity="0.9" />
    <circle cx="68" cy="22" r="17" opacity="0.55" />
  </g>
  <!-- skyline with windows -->
  <g stroke="var(--global-theme-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 82 V48 h14 v34" />
    <path d="M36 82 V34 h16 v48" />
    <path d="M60 82 V54 h13 v28" />
    <path d="M81 82 V42 h15 v40" />
    <line x1="8" y1="82" x2="132" y2="82" />
  </g>
  <g stroke="var(--global-theme-color)" stroke-width="1" opacity="0.75">
    <rect x="18" y="54" width="5" height="5" />
    <rect x="40" y="40" width="5" height="5" />
    <rect x="47" y="50" width="5" height="5" />
    <rect x="85" y="48" width="5" height="5" />
    <rect x="85" y="60" width="5" height="5" />
  </g>
  <!-- exposure-risk curve (mini chart) -->
  <path d="M104 29 C 116 28 126 22 134 10 L 134 32 L 104 32 Z" fill="url(#yl-uh-risk)" />
  <g stroke="var(--global-theme-color)" stroke-width="1.2" stroke-linecap="round">
    <path d="M102 8 V32 H136" />
    <g stroke-width="0.9" opacity="0.8">
      <line x1="100" y1="14" x2="102" y2="14" />
      <line x1="112" y1="32" x2="112" y2="34" />
      <line x1="124" y1="32" x2="124" y2="34" />
    </g>
  </g>
  <path
    d="M104 29 C 116 28 126 22 134 10"
    stroke="var(--global-highlight-color)"
    stroke-width="1.8"
    stroke-linecap="round"
  />
</svg>
