    <rect x="40" y="40" width="5" height="5" stroke-width="1.5" />
    <rect x="47" y="50" width="5" height="5" stroke-width="1.5" />
    <rect x="85" y="48" width="5" height="5" stroke-width="1.5" />
    <rect x="85" y="60" width="5" height="5" stroke-width="1.5" />
