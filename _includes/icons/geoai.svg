<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" fill="none" aria-hidden="true" focusable="false">
  <!-- satellite with panels -->
  <g stroke="var(--global-theme-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="62" y="5" width="16" height="11" rx="2" />
    <rect x="42" y="7" width="14" height="7" rx="1.5" />
    <rect x="84" y="7" width="14" height="7" rx="1.5" />
    <line x1="56" y1="10.5" x2="62" y2="10.5" />
    <line x1="78" y1="10.5" x2="84" y2="10.5" />
  </g>
  <!-- optical beam (dashed) toward the fused layer stack -->
  <g stroke="var(--global-highlight-color)" stroke-width="2" stroke-linecap="round" stroke-dasharray="4 4">
    <line x1="66" y1="19" x2="44" y2="40" />
    <line x1="71" y1="19" x2="60" y2="40" />
  </g>
  <!-- SAR side-look arcs toward the output raster -->
  <g stroke="var(--global-highlight-color)" stroke-width="2" stroke-linecap="round">
    <path d="M79 21 a11 11 0 0 1 11 11" />
    <path d="M83 17 a19 19 0 0 1 19 19" />
  </g>
  <!-- multisource layer stack (data fusion) -->
  <g stroke="var(--global-theme-color)" stroke-width="2.5" stroke-linejoin="round">
    <path d="M24 48 L52 40 L80 48 L52 56 Z" />
    <path d="M24 60 L52 52 L80 60 L52 68 Z" opacity="0.7" />
    <path d="M24 72 L52 64 L80 72 L52 80 Z" opacity="0.45" />
  </g>
  <!-- arrow: stack to map -->
  <g stroke="var(--global-highlight-color)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="83" y1="66" x2="93" y2="66" />
    <path d="M90 62 L95 66 L90 70" />
  </g>
  <!-- output classified raster -->
  <g stroke="var(--global-theme-color)" stroke-width="2.5">
    <rect x="99" y="48" width="36" height="36" />
    <line x1="111" y1="48" x2="111" y2="84" stroke-width="1.5" />
    <line x1="123" y1="48" x2="123" y2="84" stroke-width="1.5" />
    <line x1="99" y1="60" x2="135" y2="60" stroke-width="1.5" />
    <line x1="99" y1="72" x2="135" y2="72" stroke-width="1.5" />
  </g>
  <g fill="var(--global-highlight-color)" stroke="none" opacity="0.75">
    <rect x="111" y="48" width="12" height="12" />
    <rect x="99" y="72" width="12" height="12" />
    <rect x="123" y="60" width="12" height="12" />
  </g>
</svg>
