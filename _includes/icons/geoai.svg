<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 90" fill="none" aria-hidden="true" focusable="false">
  <defs>
    <linearGradient id="yl-geo-beam" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" style="stop-color: var(--global-highlight-color); stop-opacity: 0.45" />
      <stop offset="1" style="stop-color: var(--global-highlight-color); stop-opacity: 0.04" />
    </linearGradient>
    <linearGradient id="yl-geo-layer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" style="stop-color: var(--global-theme-color); stop-opacity: 0.18" />
      <stop offset="1" style="stop-color: var(--global-theme-color); stop-opacity: 0.03" />
    </linearGradient>
  </defs>
  <!-- satellite with panels -->
  <g stroke="var(--global-theme-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="62" y="5" width="16" height="11" rx="2" />
    <rect x="42" y="7" width="14" height="7" rx="1.5" />
    <rect x="84" y="7" width="14" height="7" rx="1.5" />
    <line x1="56" y1="10.5" x2="62" y2="10.5" />
    <line x1="78" y1="10.5" x2="84" y2="10.5" />
  </g>
  <!-- optical beam: translucent cone -->
  <path d="M65 19 L72 19 L62 40 L42 40 Z" fill="url(#yl-geo-beam)" />
  <line x1="68.5" y1="19" x2="52" y2="40" stroke="var(--global-highlight-color)" stroke-width="1" stroke-dasharray="3 3" opacity="0.6" />
  <!-- SAR side-look arcs -->
  <g stroke="var(--global-highlight-color)" stroke-width="1.2" stroke-linecap="round">
    <path d="M79 21 a9 9 0 0 1 9 9" opacity="0.9" />
    <path d="M82 18 a15 15 0 0 1 15 15" opacity="0.6" />
    <path d="M85 15 a21 21 0 0 1 21 21" opacity="0.35" />
  </g>
  <!-- multisource layer stack (data fusion) -->
  <g stroke="var(--global-theme-color)" stroke-width="1.5" stroke-linejoin="round">
    <path d="M24 48 L52 40 L80 48 L52 56 Z" fill="url(#yl-geo-layer)" />
    <path d="M24 60 L52 52 L80 60 L52 68 Z" fill="url(#yl-geo-layer)" opacity="0.65" />
    <path d="M24 72 L52 64 L80 72 L52 80 Z" fill="url(#yl-geo-layer)" opacity="0.38" />
  </g>
  <!-- arrow: stack to map -->
  <g stroke="var(--global-highlight-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <line x1="83" y1="66" x2="93" y2="66" />
    <path d="M90 62.5 L94.5 66 L90 69.5" />
  </g>
  <!-- output classified raster -->
  <g fill="var(--global-highlight-color)" stroke="none">
    <rect x="111" y="48" width="12" height="12" opacity="0.8" />
    <rect x="123" y="60" width="12" height="12" opacity="0.45" />
    <rect x="99" y="72" width="12" height="12" opacity="0.6" />
  </g>
  <g fill="var(--global-theme-color)" stroke="none">
    <rect x="99" y="48" width="12" height="12" opacity="0.28" />
    <rect x="123" y="72" width="12" height="12" opacity="0.4" />
    <rect x="111" y="60" width="12" height="12" opacity="0.14" />
  </g>
  <g stroke="var(--global-theme-color)" stroke-width="1.2">
    <rect x="99" y="48" width="36" height="36" />
    <g stroke-width="0.8" opacity="0.7">
      <line x1="111" y1="48" x2="111" y2="84" />
      <line x1="123" y1="48" x2="123" y2="84" />
      <line x1="99" y1="60" x2="135" y2="60" />
      <line x1="99" y1="72" x2="135" y2="72" />
    </g>
  </g>
</svg>
